<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>打地鼠遊戲 - HTML 版</title>
  <style>
    :root {
      --ui-bg: #b7eb21;
      --field-bg: #96c93d;
      --panel: #1f2a1f;
      --text: #102010;
      --accent: #f7f1d1;
      --hole: #6d3f30;
      --hole-shadow: #4b2519;
      --btn: #fffef0;
      --btn-border: #1b1b1b;
      --btn-active: #d3f29f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, #f3ffb0 0%, transparent 35%),
        radial-gradient(circle at 80% 12%, #e4ff8d 0%, transparent 32%),
        linear-gradient(180deg, #d9f57a 0%, #a9da4f 100%);
    }

    .game-wrap {
      width: min(96vw, 760px);
      display: grid;
      gap: 10px;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      border: 2px solid #2f3d2f;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
    }

    .title {
      font-size: clamp(22px, 3.2vw, 34px);
      font-weight: 800;
      letter-spacing: 2px;
      text-decoration: underline;
    }

    .designer {
      font-size: clamp(13px, 1.8vw, 17px);
      font-weight: 700;
      background: #202020;
      color: #d5e7ff;
      border-radius: 8px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      border: 2px solid #334033;
      background: #eef8c9;
      min-width: 105px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      border: 2px solid var(--btn-border);
      border-radius: 10px;
      background: var(--btn);
      font-size: 16px;
      font-weight: 700;
      padding: 7px 14px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button.active { background: var(--btn-active); }

    canvas {
      width: 100%;
      height: auto;
      border: 3px solid #2a362a;
      border-radius: 14px;
      background: #9cd443;
      touch-action: manipulation;
      display: block;
    }

    .hint {
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      color: #243524;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="hud">
      <div class="designer">設計者:李俊慶</div>
      <div class="title">打地鼠遊戲</div>
      <div class="stats">
        <div id="scoreChip" class="chip">分數: 0</div>
        <div id="timeChip" class="chip">剩餘: 30 秒</div>
        <div id="bestChip" class="chip">最高分: 0</div>
        <div class="controls">
          <button id="startBtn">開始</button>
          <button id="restartBtn">重新開始</button>
          <button id="musicBtn">音樂: 關</button>
        </div>
      </div>
    </div>

    <canvas id="gameCanvas" width="700" height="750" aria-label="打地鼠遊戲畫布"></canvas>
    <div class="hint">規則: 打中 +1，打空 -1，時間 30 秒。第一次按開始會啟用音效。</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreChip = document.getElementById("scoreChip");
    const timeChip = document.getElementById("timeChip");
    const bestChip = document.getElementById("bestChip");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const musicBtn = document.getElementById("musicBtn");

    const GAME_SECONDS = 30;
    const TOP_H = 340;
    const HOLES = [
      { x: 148, y: 420 }, { x: 350, y: 420 }, { x: 552, y: 420 },
      { x: 148, y: 530 }, { x: 350, y: 530 }, { x: 552, y: 530 },
      { x: 148, y: 640 }, { x: 350, y: 640 }, { x: 552, y: 640 }
    ];

    const moles = HOLES.map((h) => ({ ...h, visible: false, hideAt: 0, rise: 0 }));

    let score = 0;
    let timeLeft = GAME_SECONDS;
    let running = false;
    let lastTs = 0;
    let moleSpawnCd = 0;
    let secondAcc = 0;
    let hammer = { x: 560, y: 70, show: false, ttl: 0 };

    const BEST_SCORE_KEY = "whack_a_mole_best_score";
    const BGM_ENABLED_KEY = "whack_a_mole_bgm_enabled";
    let highScore = 0;

    let audioCtx = null;
    let audioUnlocked = false;
    let bgmEnabled = false;
    let bgmNodes = null;

    function loadSettings() {
      try {
        const savedBest = Number(localStorage.getItem(BEST_SCORE_KEY));
        if (!Number.isNaN(savedBest) && savedBest > 0) {
          highScore = Math.floor(savedBest);
        }
      } catch (_) {
        highScore = 0;
      }

      try {
        bgmEnabled = localStorage.getItem(BGM_ENABLED_KEY) === "1";
      } catch (_) {
        bgmEnabled = false;
      }
      updateMusicBtn();
    }

    function saveHighScore() {
      try {
        localStorage.setItem(BEST_SCORE_KEY, String(highScore));
      } catch (_) {}
    }

    function saveBgmSetting() {
      try {
        localStorage.setItem(BGM_ENABLED_KEY, bgmEnabled ? "1" : "0");
      } catch (_) {}
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      audioUnlocked = true;
    }

    function playTone(freq, durationMs, type, volume, startOffset = 0) {
      if (!audioUnlocked || !audioCtx) return;
      const now = audioCtx.currentTime + startOffset;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + durationMs / 1000);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + durationMs / 1000 + 0.02);
    }

    function startBgm() {
      if (!audioUnlocked || !audioCtx || bgmNodes) return;

      const master = audioCtx.createGain();
      master.gain.value = 0.03;

      const low = audioCtx.createOscillator();
      low.type = "triangle";
      low.frequency.value = 196;

      const high = audioCtx.createOscillator();
      high.type = "sine";
      high.frequency.value = 293.66;

      const lfo = audioCtx.createOscillator();
      lfo.type = "sine";
      lfo.frequency.value = 0.35;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.015;

      lfo.connect(lfoGain);
      lfoGain.connect(master.gain);

      low.connect(master);
      high.connect(master);
      master.connect(audioCtx.destination);

      low.start();
      high.start();
      lfo.start();

      bgmNodes = { low, high, lfo, lfoGain, master };
    }

    function stopBgm() {
      if (!bgmNodes) return;
      bgmNodes.low.stop();
      bgmNodes.high.stop();
      bgmNodes.lfo.stop();
      bgmNodes.low.disconnect();
      bgmNodes.high.disconnect();
      bgmNodes.lfo.disconnect();
      bgmNodes.lfoGain.disconnect();
      bgmNodes.master.disconnect();
      bgmNodes = null;
    }

    function updateMusicBtn() {
      musicBtn.textContent = bgmEnabled ? "音樂: 開" : "音樂: 關";
      musicBtn.classList.toggle("active", bgmEnabled);
    }

    function setBgmEnabled(enabled) {
      bgmEnabled = enabled;
      updateMusicBtn();
      saveBgmSetting();
      if (bgmEnabled) {
        startBgm();
      } else {
        stopBgm();
      }
    }

    function sfxHit() {
      playTone(620, 90, "triangle", 0.25, 0);
      playTone(920, 80, "triangle", 0.18, 0.07);
    }

    function sfxMiss() {
      playTone(180, 130, "sawtooth", 0.14, 0);
      playTone(120, 120, "square", 0.1, 0.05);
    }

    function sfxPop() {
      playTone(380, 60, "square", 0.08, 0);
    }

    function sfxGameOver() {
      playTone(440, 120, "triangle", 0.13, 0);
      playTone(330, 150, "triangle", 0.12, 0.14);
      playTone(262, 230, "triangle", 0.12, 0.31);
    }

    function resetGame() {
      score = 0;
      timeLeft = GAME_SECONDS;
      running = true;
      secondAcc = 0;
      moleSpawnCd = 0;
      hammer.show = false;
      moles.forEach((m) => {
        m.visible = false;
        m.hideAt = 0;
        m.rise = 0;
      });
      updateHud();
      startBtn.classList.add("active");
    }

    function stopGame() {
      running = false;
      startBtn.classList.remove("active");
      moles.forEach((m) => { m.visible = false; m.rise = 0; });
      sfxGameOver();

      if (score > highScore) {
        highScore = score;
        saveHighScore();
      }
      updateHud();

      const again = window.confirm(`時間到！\n你的得分: ${score}\n\n要重新開始嗎？`);
      if (again) resetGame();
    }

    function updateHud() {
      scoreChip.textContent = `分數: ${score}`;
      timeChip.textContent = `剩餘: ${Math.max(0, timeLeft)} 秒`;
      bestChip.textContent = `最高分: ${highScore}`;
    }

    function spawnMoles(nowMs) {
      const count = 1 + Math.floor(Math.random() * 2);
      const choices = moles.filter((m) => !m.visible);
      for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
      }
      choices.slice(0, count).forEach((m) => {
        m.visible = true;
        m.hideAt = nowMs + 650 + Math.random() * 500;
        m.rise = 0;
        sfxPop();
      });
    }

    function update(dtMs, nowMs) {
      if (!running) return;

      secondAcc += dtMs;
      while (secondAcc >= 1000 && running) {
        secondAcc -= 1000;
        timeLeft -= 1;
        updateHud();
        if (timeLeft <= 0) {
          stopGame();
        }
      }

      moleSpawnCd -= dtMs;
      if (moleSpawnCd <= 0 && running) {
        spawnMoles(nowMs);
        moleSpawnCd = 520 + Math.random() * 280;
      }

      moles.forEach((m) => {
        if (m.visible) {
          m.rise = Math.min(1, m.rise + dtMs / 180);
          if (nowMs >= m.hideAt) m.visible = false;
        } else {
          m.rise = Math.max(0, m.rise - dtMs / 160);
        }
      });

      if (hammer.show) {
        hammer.ttl -= dtMs;
        if (hammer.ttl <= 0) hammer.show = false;
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#b4e80a";
      ctx.fillRect(0, 0, 700, TOP_H);

      ctx.fillStyle = "#8ec63f";
      ctx.fillRect(0, TOP_H, 700, 410);

      ctx.fillStyle = "#b9d650";
      for (let y = TOP_H + 12; y < 750; y += 25) {
        for (let x = 15; x < 700; x += 30) {
          ctx.beginPath();
          ctx.ellipse(x, y, 4, 2.2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawHole(x, y) {
      ctx.fillStyle = "#4f2518";
      ctx.beginPath();
      ctx.ellipse(x, y + 3, 60, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#6d3f30";
      ctx.beginPath();
      ctx.ellipse(x, y, 55, 17, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawMole(m) {
      if (m.rise <= 0.02) return;
      const cx = m.x;
      const baseY = m.y;
      const shift = (1 - m.rise) * 55;

      ctx.fillStyle = "#b26f2f";
      ctx.strokeStyle = "#8a5526";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(cx, baseY - 43 + shift, 40, 37, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#d8aa71";
      ctx.beginPath();
      ctx.ellipse(cx, baseY - 42 + shift, 27, 27, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(cx - 12, baseY - 54 + shift, 7, 6, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + 12, baseY - 54 + shift, 7, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#1f1f1f";
      ctx.beginPath();
      ctx.arc(cx - 12, baseY - 54 + shift, 2.2, 0, Math.PI * 2);
      ctx.arc(cx + 12, baseY - 54 + shift, 2.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#d67876";
      ctx.beginPath();
      ctx.ellipse(cx, baseY - 43 + shift, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff7dc";
      ctx.fillRect(cx - 9, baseY - 34 + shift, 7, 10);
      ctx.fillRect(cx + 2, baseY - 34 + shift, 7, 10);
    }

    function drawHammer() {
      if (!hammer.show) return;
      const x = hammer.x;
      const y = hammer.y;

      ctx.strokeStyle = "#a65f1f";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(x - 2, y + 5);
      ctx.lineTo(x + 22, y + 52);
      ctx.stroke();

      ctx.fillStyle = "#9ea3ad";
      ctx.strokeStyle = "#4d5158";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 20, y - 6);
      ctx.lineTo(x + 20, y - 6);
      ctx.lineTo(x + 26, y + 18);
      ctx.lineTo(x - 26, y + 18);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawHeaderArt() {
      ctx.fillStyle = "#2d1b00";
      ctx.font = "bold 56px Microsoft JhengHei, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("打地鼠遊戲", 350, 115);
      ctx.strokeStyle = "#2d1b00";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(235, 132);
      ctx.lineTo(465, 132);
      ctx.stroke();

      ctx.strokeStyle = "#a65f1f";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(588, 34);
      ctx.lineTo(640, 112);
      ctx.stroke();

      ctx.fillStyle = "#b4b7be";
      ctx.strokeStyle = "#565b63";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(538, 22);
      ctx.lineTo(598, 22);
      ctx.lineTo(615, 62);
      ctx.lineTo(526, 62);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function render() {
      drawBackground();
      drawHeaderArt();
      HOLES.forEach((h) => drawHole(h.x, h.y));
      moles.forEach(drawMole);
      drawHammer();
    }

    function loop(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min(34, ts - lastTs);
      lastTs = ts;
      update(dt, ts);
      render();
      requestAnimationFrame(loop);
    }

    function hitTestMole(px, py, mole) {
      if (!mole.visible || mole.rise < 0.2) return false;
      const cx = mole.x;
      const cy = mole.y - 43 + (1 - mole.rise) * 55;
      const dx = px - cx;
      const dy = py - cy;
      return dx * dx + dy * dy <= 45 * 45;
    }

    function toCanvasPos(evt) {
      const r = canvas.getBoundingClientRect();
      const scaleX = canvas.width / r.width;
      const scaleY = canvas.height / r.height;
      return {
        x: (evt.clientX - r.left) * scaleX,
        y: (evt.clientY - r.top) * scaleY
      };
    }

    function onPointerDown(evt) {
      const p = toCanvasPos(evt);
      hammer.x = p.x;
      hammer.y = p.y;
      hammer.show = true;
      hammer.ttl = 110;

      if (!running) return;
      if (p.y < TOP_H) return;

      let hit = false;
      for (const m of moles) {
        if (hitTestMole(p.x, p.y, m)) {
          hit = true;
          m.visible = false;
          m.rise = 0;
          score += 1;
          sfxHit();
          break;
        }
      }

      if (!hit) {
        score -= 1;
        sfxMiss();
      }
      updateHud();
    }

    startBtn.addEventListener("click", () => {
      ensureAudio();
      if (bgmEnabled) startBgm();
      if (!running) resetGame();
    });

    restartBtn.addEventListener("click", () => {
      ensureAudio();
      if (bgmEnabled) startBgm();
      resetGame();
    });

    musicBtn.addEventListener("click", () => {
      ensureAudio();
      setBgmEnabled(!bgmEnabled);
    });

    canvas.addEventListener("pointerdown", onPointerDown);

    loadSettings();
    updateHud();
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
