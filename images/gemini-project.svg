<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Gemini 2.5 Flash 專案縮圖</title>
  <desc id="desc">以暖色漸層與對話泡泡構成的 Gemini 互動頁示意圖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3de"/>
      <stop offset="1" stop-color="#ffd1ad"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fef8f0" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7f4e"/>
      <stop offset="1" stop-color="#e84f2a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="110" r="160" fill="#ff8f66" fill-opacity="0.22"/>
  <circle cx="180" cy="620" r="170" fill="#0f8b80" fill-opacity="0.2"/>

  <rect x="180" y="90" width="920" height="540" rx="34" fill="url(#card)" stroke="#2f3043" stroke-opacity="0.16"/>

  <rect x="230" y="140" width="170" height="44" rx="22" fill="#0a9888"/>
  <text x="315" y="170" font-size="24" text-anchor="middle" font-family="Noto Sans TC, sans-serif" fill="#ffffff">MODEL</text>

  <text x="230" y="235" font-size="62" font-weight="700" font-family="Noto Sans TC, sans-serif" fill="#22253a">Gemini 2.5 Flash</text>
  <text x="230" y="278" font-size="30" font-family="Noto Sans TC, sans-serif" fill="#4a4d66">API Key、問題輸入、送出、回覆顯示</text>

  <rect x="230" y="322" width="820" height="70" rx="14" fill="#ffffff" stroke="#2f3043" stroke-opacity="0.2"/>
  <text x="260" y="366" font-size="30" font-family="Noto Sans TC, sans-serif" fill="#6a6e87">Gemini API Key</text>

  <rect x="230" y="412" width="820" height="110" rx="14" fill="#ffffff" stroke="#2f3043" stroke-opacity="0.2"/>
  <text x="260" y="457" font-size="30" font-family="Noto Sans TC, sans-serif" fill="#6a6e87">請介紹 Gemini 2.5 Flash</text>

  <rect x="230" y="540" width="260" height="58" rx="14" fill="url(#btn)"/>
  <text x="360" y="578" font-size="29" font-weight="700" text-anchor="middle" font-family="Noto Sans TC, sans-serif" fill="#ffffff">送出訊息</text>

  <g transform="translate(760 534)">
    <rect x="0" y="0" width="290" height="72" rx="15" fill="#e8fffb" stroke="#0f8b80" stroke-opacity="0.38"/>
    <circle cx="40" cy="36" r="9" fill="#0f8b80"/>
    <circle cx="68" cy="36" r="9" fill="#0f8b80" fill-opacity="0.72"/>
    <circle cx="96" cy="36" r="9" fill="#0f8b80" fill-opacity="0.45"/>
  </g>
</svg>
