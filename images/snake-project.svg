<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">貪吃蛇作品縮圖</title>
  <desc id="desc">顯示綠色蛇身與紅色食物的遊戲縮圖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#162b3f"/>
      <stop offset="1" stop-color="#1e4862"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56d38a"/>
      <stop offset="1" stop-color="#188f58"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect x="130" y="110" width="1020" height="500" rx="40" fill="#0f1e2b" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M260 500c120-150 170-170 290-95s155 85 225 10 125-80 220-30 135 54 190-18" fill="none" stroke="url(#snake)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M260 500c120-150 170-170 290-95s155 85 225 10 125-80 220-30 135 54 190-18" fill="none" stroke="#bff6d0" stroke-opacity="0.35" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="980" cy="238" r="44" fill="#ff5a5f"/>
  <circle cx="960" cy="224" r="8" fill="#fff"/>
  <circle cx="136" cy="134" r="10" fill="#ffdd57"/>
  <circle cx="180" cy="134" r="10" fill="#ffdd57"/>
  <circle cx="224" cy="134" r="10" fill="#ffdd57"/>
  <text x="190" y="190" font-size="42" font-family="Noto Sans TC, sans-serif" fill="#d7f7ea">SNAKE</text>
</svg>
