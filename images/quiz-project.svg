<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">英文單字選擇題測驗作品縮圖</title>
  <desc id="desc">顯示英文單字測驗介面與選擇題選項的縮圖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8e5ff"/>
      <stop offset="1" stop-color="#d4b5ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f9f7ff"/>
    </linearGradient>
    <linearGradient id="option-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#5a67d8"/>
    </linearGradient>
    <linearGradient id="option-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#b970f0"/>
    </linearGradient>
    <linearGradient id="option-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="option-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- 裝飾圓形 -->
  <circle cx="150" cy="600" r="120" fill="#667eea" fill-opacity="0.12"/>
  <circle cx="1100" cy="120" r="140" fill="#c084fc" fill-opacity="0.15"/>
  
  <!-- 主卡片 -->
  <rect x="240" y="60" width="800" height="600" rx="30" fill="url(#card)" stroke="#e9d5ff" stroke-width="2"/>
  
  <!-- 標題區 -->
  <text x="640" y="130" font-size="36" font-weight="bold" font-family="Noto Sans TC, sans-serif" text-anchor="middle" fill="#2d3748">英文單字測驗</text>
  <text x="640" y="165" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#718096">English Vocabulary Quiz</text>
  
  <!-- 分隔線 -->
  <line x1="300" y1="185" x2="980" y2="185" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- 問題區 -->
  <text x="310" y="230" font-size="18" font-weight="600" font-family="Noto Sans TC, sans-serif" fill="#1a202c">第 1 題</text>
  <text x="310" y="265" font-size="20" font-weight="bold" font-family="Noto Sans TC, sans-serif" fill="#1a202c">What does 'serendipity' mean?</text>
  
  <!-- 選項 A -->
  <rect x="310" y="295" width="630" height="60" rx="12" fill="url(#option-a)" opacity="0.15"/>
  <circle cx="330" cy="325" r="8" fill="url(#option-a)"/>
  <text x="355" y="332" font-size="16" font-weight="600" font-family="Noto Sans TC, sans-serif" fill="#1a202c">(A) 偶然發生的幸運事件</text>
  
  <!-- 選項 B -->
  <rect x="310" y="370" width="630" height="60" rx="12" fill="url(#option-b)" opacity="0.15"/>
  <circle cx="330" cy="400" r="8" fill="url(#option-b)"/>
  <text x="355" y="407" font-size="16" font-weight="600" font-family="Noto Sans TC, sans-serif" fill="#1a202c">(B) 刻意計劃的事件</text>
  
  <!-- 選項 C -->
  <rect x="310" y="445" width="630" height="60" rx="12" fill="url(#option-c)" opacity="0.15"/>
  <circle cx="330" cy="475" r="8" fill="url(#option-c)"/>
  <text x="355" y="482" font-size="16" font-weight="600" font-family="Noto Sans TC, sans-serif" fill="#1a202c">(C) 不幸的意外</text>
  
  <!-- 選項 D -->
  <rect x="310" y="520" width="630" height="60" rx="12" fill="url(#option-d)" opacity="0.15"/>
  <circle cx="330" cy="550" r="8" fill="url(#option-d)"/>
  <text x="355" y="557" font-size="16" font-weight="600" font-family="Noto Sans TC, sans-serif" fill="#1a202c">(D) 重複發生的事件</text>
  
  <!-- 頁腳進度指示 -->
  <text x="640" y="608" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#a0aec0">第 1 題 / 10 題</text>
  
  <!-- 進度條 -->
  <rect x="310" y="625" width="630" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="310" y="625" width="63" height="8" rx="4" fill="url(#option-a)"/>
</svg>
